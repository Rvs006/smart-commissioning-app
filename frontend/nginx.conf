# nginx server config for the production frontend image (frontend/Dockerfile).
# Installed as /etc/nginx/conf.d/default.conf inside nginx:stable-alpine.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Import uploads (Excel workbooks etc.) flow through the /api proxy.
    client_max_body_size 25m;

    # Compress text assets; binary formats are already compressed.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Reverse proxy to the API service on the compose network. proxy_pass
    # without a URI part preserves the original request path, so
    # /api/v1/health -> http://api:8000/api/v1/health.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hashed Vite build output is immutable: cache aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
