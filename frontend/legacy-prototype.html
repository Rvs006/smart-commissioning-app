    if(!/^\d+$/.test(net) || Number(net)<0 || Number(net)>65535) errors["cfg:bacnet:BACnet Network Number"]="BACnet network number must be 0 to 65535.";
    if(!/^\d+$/.test(mqttPort) || Number(mqttPort)>65535) errors["cfg:mqtt:Port"]="MQTT port must be numeric and <= 65535.";
    if(!String(root).trim()) errors["cfg:mqtt:Root Topic"]="Root topic must not be empty.";
    return errors;
  }

  function statusForConfig(key){

  function bacnetInspector(s){ if(!s) return `<section class="card card-pad">No BACnet device selected.</section>`;

  function cycleFontSize(){

  async function checkBackendHealth(silent=true){
    if(REVIEW_ONLY){
      state.apiStatus = { status:"review", message:"Standalone HTML review file", checkedAt:new Date().toISOString() };
      if(!silent) toast("Standalone HTML review mode. No backend service is required.", "success");
      return true;
    }
    const checking = { status:"checking", message:"Checking service connection...", checkedAt:new Date().toISOString() };
    state.apiStatus = checking;
    if(!silent) render();
    try{
      const resp = await fetch(`${API_BASE}/ready`, { headers:{"Accept":"application/json"}, cache:"no-store" });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const next = { status:"online", message:`${data.status || "ok"} at ${data.timestamp || "unknown time"}`, checkedAt:new Date().toISOString() };
      state.apiStatus = next;
      recordAudit("api.health", "Service connection check passed", "pass", data);
      render();
      if(!silent) toast("Service connection is online.");
      return true;
    }catch(err){
      const next = { status:"offline", message:String(err.message || err), checkedAt:new Date().toISOString() };
      state.apiStatus = next;
      recordAudit("api.health", "Service connection check failed", "warn", {message:next.message});
      render();
      if(!silent) toast("Service connection is unavailable. Workspace review mode remains safe.", "warn");
      return false;
    }
  }

  async function apiJSON(path, options={}){
    const headers = {"Accept":"application/json", ...(options.headers || {})};
    const init = {...options, headers};
    if(options.body && typeof options.body !== "string"){
      init.headers = {...headers, "Content-Type":"application/json"};
      init.body = JSON.stringify(options.body);
    }
    const resp = await fetch(`${API_BASE}${path}`, init);
    if(!resp.ok) throw new Error(await resp.text());
    return resp.json();
  }

  function rememberRun(run, label){
    const record = {
      run_id:run.run_id || run.report_id,
      job_type:run.job_type || "report_generation",
      report_type:run.report_type,
      status:run.status,
      label,
      queued_at:new Date().toISOString()
    };
    state.activeRuns = [record, ...(state.activeRuns || []).filter(item => item.run_id !== record.run_id)].slice(0,10);
    saveJSON("sct.activeRuns", state.activeRuns);
    return record;
  }

  async function queueRun(path, jobType, parameters, label){
    if(REVIEW_ONLY){
      const data = {
        run_id:`review_${jobType}_${Date.now()}`,
        job_type:jobType,
        status:"queued",
        message:`${label} captured in standalone review mode.`
      };
      rememberRun(data, label);
      recordAudit(`${jobType}.review`, `${label} captured for review: ${data.run_id}`, "pass", data);
      toast(`${label} captured for review.`);
      return data;
    }
    const online = await checkBackendHealth(true);
    if(!online) throw new Error("Service connection check failed.");
    const data = await apiJSON(path, {
      method:"POST",
      body:{project_id:PROJECT_ID, site_id:SITE_ID, job_type:jobType, parameters}
    });
    rememberRun(data, label);
    recordAudit(`${jobType}.queue`, `${label} queued: ${data.run_id}`, "pass", data);
    toast(`${label} queued: ${data.run_id}`);
    return data;
  }

  function parseCSV(text){
    const lines = text.replace(/\r/g,"").split("\n").filter(l=>l.trim()); if(!lines.length) return [];
    const split = line => { const out=[]; let cur="", q=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(ch==='"'){ q=!q; continue; } if(ch===","&&!q){ out.push(cur.trim()); cur=""; } else cur+=ch; } out.push(cur.trim()); return out; };
    const headers = split(lines[0]).map(h=>h.trim());
    return lines.slice(1).map(l => Object.fromEntries(split(l).map((v,i)=>[headers[i],v])));
  }
  function handleCSVImport(type, rows){
    if(!rows.length) throw new Error("No rows found.");
    if(type==="ip"){
      const mapped = rows.map(r => ({ ip:r.ip_address||r.ip||r["Expected IP address"]||"0.0.0.0", host:r.hostname||r["Expected hostname"]||r.device_name||"Imported Device", status:"Not Tested", latency:"—", ports:r.expected_ports||r["Expected services/ports"]||"—", service:r.expected_services||"—", register:"Imported", project:r.project||r["Project/site"]||"Imported", type:r.device_type||"Unknown", vendor:r.manufacturer||r.vendor||"Unknown", model:r.model||"Unknown", location:r.location||"Unknown", mac:"—", notes:r.notes||"" }));
      state.ipRows = mapped; saveJSON("sct.ipRows", mapped); recordAudit("import.ip", `Imported ${mapped.length} IP register rows`, "pass", {rows:mapped.length}); toast(`Imported ${mapped.length} IP register rows.`); return;
    }
    if(type==="bacnet"){
      const mapped = rows.map(r => ({ id:r.device_instance||r["BACnet device instance"]||r.id||"0", name:r.device_name||r.name||"Imported BACnet Device", ip:r.ip_address||"0.0.0.0", net:r.bacnet_network||r["BACnet network number"]||"0", port:r.udp_port||"47808", objects:r.expected_object_count||"0", register:"Imported", online:"Not Tested", vendor:r.vendor||r.manufacturer||"Unknown", firmware:"Unknown", location:r.location||"Unknown" }));
      state.bacnetRows = mapped; saveJSON("sct.bacnetRows", mapped); recordAudit("import.bacnet", `Imported ${mapped.length} BACnet register rows`, "pass", {rows:mapped.length}); toast(`Imported ${mapped.length} BACnet register rows.`); return;
    }
    if(type==="mqtt"){
      const mapped = rows.map(r => ({ topic:r.expected_topic||r.topic||"", asset:r.asset_name||r.asset_id||"Imported Asset", payload:r.payload_type||"unknown", rate:"0 msg/s", status:"Not Tested", register:"Imported", last:"—", count:0 }));
      state.mqttRows = mapped; saveJSON("sct.mqttRows", mapped); recordAudit("import.mqtt", `Imported ${mapped.length} MQTT register rows`, "pass", {rows:mapped.length}); toast(`Imported ${mapped.length} MQTT register rows.`); return;
    }
    if(type==="validation"){
      const mapped = rows.map(r => ({ asset:r.asset_name||r.asset_id||"Imported Asset", source:r.source_protocol||"BACnet + MQTT", valid:"0 / 0 (Not Tested)", result:"Not Tested", issues:"0", last:"—", project:r.project||r["Project/site"]||"Imported" }));
      state.validationRows = mapped; saveJSON("sct.validationRows", mapped); recordAudit("import.validation", `Imported ${mapped.length} validation rows`, "pass", {rows:mapped.length}); toast(`Imported ${mapped.length} validation rows.`); return;
    }
    toast(`Imported ${rows.length} rows. This page has no custom importer yet.`, "warn");
  }

    state.reportHtml = state.reportHtml || "pending";
    const reportStatus = reportRun ? `<p>${pill("Queued", "amber")} <b>Report ID:</b> ${escapeHTML(reportRun.report_id)}<br><b>Artifact:</b> ${escapeHTML(reportRun.file_name)}</p>` : `<p>${pill("Not queued", "red")} Start the API service and queue the evidence pack again.</p>`;
    const html = `<div class="report-preview"><h2>Smart Commissioning Evidence Pack</h2>${reportStatus}<p><b>Project:</b> ${escapeHTML(PROJECT_ID)}<br><b>Site:</b> ${escapeHTML(SITE_ID)}<br><b>Generated:</b> ${now}<br><b>Tool version:</b> v1.0.0<br><b>User:</b> MSI operator</p><h3>Discovery summary</h3><ul><li>IP devices: ${state.ipRows.length} records, ${state.ipRows.filter(r=>r.status==="Rogue Host").length} rogue host(s).</li><li>BACnet devices: ${state.bacnetRows.length} records, ${state.bacnetRows.reduce((a,b)=>a+Number(b.objects||0),0).toLocaleString()} objects.</li><li>MQTT assets: ${state.mqttRows.length} records, ${state.mqttRows.filter(r=>r.status!=="Valid").length} payload issue(s).</li></ul><h3>UDMI payload summary</h3><ul><li>Expected UDMI assets: ${state.udmiRows.length}</li><li>Publishing observed: ${state.udmiRows.filter(r=>r.publishing==="Seen").length}</li><li>Not publishing: ${state.udmiRows.filter(r=>r.publishing==="Not Publishing").length}</li><li>Pointset/state passes: ${state.udmiRows.filter(r=>r.result==="Pass").length}</li><li>Assets with issues: ${state.udmiRows.filter(r=>r.issueCount>0).length}</li></ul><h3>Validation summary</h3><ul><li>Assets validated: ${state.validationRows.length}</li><li>Pass: ${state.validationRows.filter(r=>r.result==="Pass").length}</li><li>Warning: ${state.validationRows.filter(r=>r.result==="Warning").length}</li><li>Fail: ${state.validationRows.filter(r=>r.result==="Fail").length}</li></ul><h3>Key issue</h3><p>AHU-L04-01 damper position mapping is outside tolerance. BACnet live value 48.0%, MQTT live value 41.0%, tolerance ±5.0%.</p><h3>Audit trail</h3>${auditList(5)}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px"><button class="square-btn primary" data-action="download-report-html">Download HTML report</button><button class="square-btn" data-action="download-evidence-manifest">Download JSON manifest</button><button class="square-btn" onclick="window.print()">Print / Save PDF</button></div></div>`;
    state.reportHtml = html;
    state.page = "reports"; render(); syncUrl(false);
    if(reportRun) toast("Evidence pack request queued.");
  }

  function exportCurrent(){ exportByAction({configuration:"export-config", ip:"export-ip", bacnet:"export-bacnet-objects", mqtt:"export-mqtt", validation:"export-validation", udmi:"export-udmi", reports:"export-validation"}[state.page]); }
  function exportByAction(action){
    if(action==="export-config") download("sct_configuration.json", JSON.stringify(state.config,null,2), "application/json");
    if(action==="export-ip" || action==="export-selected-ip") downloadCSV("ip_discovery_export.csv", action==="export-selected-ip" ? [state.ipRows.find(r=>r.ip===state.selectedIp)] : state.ipRows);
    if(action==="export-bacnet-objects") downloadCSV("bacnet_objects_export.csv", bacnetPoints.map(p=>({object_type:p[0], object_name:p[1], instance:p[2], present_value:p[3], units:p[4], status_flags:p[5], reliability:p[6]})));
    if(action==="export-mqtt") downloadCSV("mqtt_discovery_export.csv", state.mqttRows);
    if(action==="export-validation") downloadCSV("validation_results_export.csv", state.validationRows);
    if(action==="export-udmi") downloadCSV("udmi_payload_validation_export.csv", state.udmiRows.map(r => ({asset:r.asset, expected_payload:r.expectedMode, publishing:r.publishing, result:r.result, issue_count:r.issueCount, issues:r.issues.join(" | "), evidence:r.evidence, floor:r.floor, family:r.family, zone:r.zone})));
    if(action==="export-udmi-report") download("udmi_payload_validation_report.json", JSON.stringify(udmiReportBase, null, 2), "application/json");
    if(action==="export-issues") downloadCSV("issue_register_export.csv", [
      {asset:"AHU-L04-01", point:"ahu_l04_01_damper_position", issue_type:"Out-of-tolerance value", severity:"High", source:"BACnet ↔ MQTT", suggested_action:"Check translation mapping, polling timestamp and damper object binding."},
      {asset:"PMP-01", point:"expected_schema", issue_type:"Schema/type error", severity:"Medium", source:"MQTT", suggested_action:"Confirm payload schema version and JSON path."}
    ]);
    if(action==="download-report-html") download("commissioning_evidence_pack.html", `<!doctype html><html><head><title>Evidence Pack</title><style>body{font-family:Arial,sans-serif;line-height:1.5;padding:30px}table{border-collapse:collapse}td,th{border:1px solid #ddd;padding:6px}</style></head><body>${state.reportHtml}</body></html>`, "text/html");
    recordAudit(`export.${action}`, `Export action completed: ${action}`, "pass");
  }
  function downloadCSV(filename, rows){
    rows = rows.filter(Boolean); if(!rows.length){ toast("No rows available to export.", "warn"); return; }
    const headers = Array.from(rows.reduce((s,r)=>{ Object.keys(r).forEach(k=>s.add(k)); return s; }, new Set()));
    const csv = [headers.join(","), ...rows.map(r=>headers.map(h=>`"${String(r[h] ?? "").replace(/"/g,'""')}"`).join(","))].join("\n");
    download(filename, csv, "text/csv"); toast(`Downloaded ${filename}`);
  }
  function download(filename, text, type="text/plain"){
    const blob = new Blob([text], {type}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 300);
  }
  function copyText(text){ navigator.clipboard?.writeText(text).then(()=>toast("Copied selected device JSON."),()=>toast("Clipboard unavailable.","warn")); }

  render();
  syncUrl(true);
  checkBackendHealth(true);
</script>
</body>
</html>
