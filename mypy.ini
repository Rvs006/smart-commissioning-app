# Lenient mypy baseline for the Smart Commissioning App python packages.
# Mypy is informational only (continue-on-error in CI), not a merge gate.
#
# Baseline error count (mypy 2.1.0, 2026-06-11): 17 errors total
#   backend/app: 11 errors, worker/app: 0 errors, core/smart_commissioning_core: 6 errors
#
# NOTE: backend/ and worker/ both ship a top-level package named "app", so a
# single `mypy` invocation over `files` below fails with a duplicate-module
# error. Run mypy once per package instead (as CI does):
#   mypy backend/app && mypy worker/app && mypy core/smart_commissioning_core
[mypy]
python_version = 3.12
ignore_missing_imports = True
files = backend/app, worker/app, core/smart_commissioning_core
