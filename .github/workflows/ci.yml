name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages and tooling
        run: pip install -e ./core -e ./backend -e ./worker ruff mypy

      - name: Ruff lint
        run: ruff check backend worker core

      - name: Core unit tests
        run: python -m unittest discover -s core/tests

      - name: Backend unit tests
        working-directory: backend
        run: python -m unittest discover -s tests

      # Mypy is informational only — backend/ and worker/ both ship a
      # top-level package named "app", so it runs once per package.
      - name: Mypy (informational) - backend
        run: mypy backend/app
        continue-on-error: true

      - name: Mypy (informational) - worker
        run: mypy worker/app
        continue-on-error: true

      - name: Mypy (informational) - core
        run: mypy core/smart_commissioning_core
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
