# Alembic configuration for the smart_commissioning_core persistence layer.
#
# The database URL is resolved in env.py in this order:
#   1. -x db_url=<url>     (also used by smart_commissioning_core.db.migrate)
#   2. DATABASE_URL        environment variable
#   3. sqlalchemy.url      below (local-dev SQLite fallback)

[alembic]
script_location = %(here)s/alembic
sqlalchemy.url = sqlite:///smart_commissioning.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
