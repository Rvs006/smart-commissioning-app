services:
  frontend:
    build:
      context: ../frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api

  # Run/import/configuration records live in Postgres (DATABASE_URL); the API
  # applies Alembic migrations on startup (backend owns the schema). Reports
  # are generated in-memory by the API at download time, so no run-file volume
  # is shared with the worker anymore. api_runtime only persists file
  # artifacts the API writes locally: uploaded import files and secret material.
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_runtime:/app/backend/runtime
    depends_on:
      - postgres
      - redis
      - minio

  # The worker reads/writes run rows through the same DATABASE_URL but never
  # runs migrations; it depends on the api so the schema exists first.
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
    depends_on:
      - api
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  api_runtime:
