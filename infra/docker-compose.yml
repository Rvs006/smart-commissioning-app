# Hosted deployment profile for the Smart Commissioning App.
# (The portable Windows exe under packaging/windows_portable is the edge
# profile; see infra/README.md for the runbook.)
#
# Secrets come from infra/.env (copy infra/.env.example and fill it in).
# Variables written as ${VAR:?...} make `docker compose` fail fast with a
# clear error instead of starting with an empty password/key.
#
# All published ports bind to 127.0.0.1 only. Put a TLS-terminating reverse
# proxy in front of the frontend port to expose the app beyond the host.

# Shared by api and worker: both talk to the same Postgres database and the
# same password-protected Redis. The URLs are assembled here so the password
# lives in exactly one .env variable each.
x-app-env: &app-env
  DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required (copy infra/.env.example to infra/.env)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (copy infra/.env.example to infra/.env)}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required (copy infra/.env.example to infra/.env)}"
  REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required (copy infra/.env.example to infra/.env)}@redis:6379/0"

services:
  # Production frontend: static Vite build served by nginx, which also
  # proxies /api/* to the api service so the browser talks to one origin.
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started

  # Run/import/configuration records live in Postgres (DATABASE_URL); the API
  # applies Alembic migrations on startup (backend owns the schema). Reports
  # are generated in-memory by the API at download time, so no run-file volume
  # is shared with the worker anymore. api_runtime only persists file
  # artifacts the API writes locally: uploaded import files and secret material.
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      AUTH_MODE: api_key
      API_KEY: "${API_KEY:?API_KEY is required (generate with openssl rand -hex 32)}"
      # Comma-separated browser origins allowed by CORS. Browser traffic
      # normally arrives same-origin through the nginx /api proxy (no CORS
      # involved); this only matters for direct cross-origin API access.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
    ports:
      # Loopback-only direct API access for local debugging (psql-style poking,
      # curl against /api/v1/...). Browsers should go through the frontend.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - api_runtime:/app/backend/runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python:slim ships no curl/wget; probe readiness with stdlib urllib.
      # urlopen raises (non-zero exit) on connection errors and on 503.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # The worker reads/writes run rows through the same DATABASE_URL but never
  # runs migrations; it depends on the api (service_started) so the schema
  # exists before jobs are picked up.
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required (copy infra/.env.example to infra/.env)}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required (copy infra/.env.example to infra/.env)}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (generate with openssl rand -hex 32)}"
    ports:
      # Loopback-only so developers can reach the database with psql from the
      # host. Drop this mapping entirely if host access is not needed.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR defers expansion to the container shell; a single $ would be
      # interpolated by compose on the host instead.
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # No published port on purpose: only api and worker need Redis, and they
  # reach it over the compose network. For ad-hoc debugging from the host use:
  #   docker compose -f infra/docker-compose.yml exec redis sh -c 'redis-cli -a "$REDIS_PASSWORD" ping'
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required (generate with openssl rand -hex 32)}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  api_runtime:
